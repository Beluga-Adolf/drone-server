<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Light iPad 控制</title>
<style>
body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
#header { background: #007ACC; color: white; padding: 12px; text-align: center; font-size: 20px; }
#status { display: flex; justify-content: space-around; padding: 10px; background: #eee; }
.dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.off { background: #bbb; }
.on { background: #0f0; }
#controls { padding: 10px; }
#videoContainer { text-align: center; margin: 10px; }
#videoFeed { width: 90%; max-width: 600px; display: none; border: 1px solid #ccc; }
#videoPlaceholder { width: 90%; max-width: 600px; height: 340px; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="header">Trace Light 控制 iPad 版</div>

<div id="status">
    <div>
        <span class="dot off" id="dotServer"></span>
        <span id="lblServer">服务器未连接</span>
    </div>
    <div>
        <span class="dot off" id="dotVideo"></span>
        <span id="lblVideo">视频未启用</span>
    </div>
    <div>
        <span id="clock">--:--:--</span>
    </div>
</div>

<div id="controls">
    <!-- 这里保持原有按钮或控制界面 -->
</div>

<div id="videoContainer">
    <div id="videoPlaceholder">摄像头预览区域</div>
    <video id="videoFeed" autoplay playsinline></video>
</div>

<script>
// ===== WebSocket 连接与断线重连 =====
const SERVER = 'wss://trace-light-drone-server.onrender.com'; // 更新为实际服务器地址
let ws = null;
let reconnectDelay = 2000;
let reconnectTimer = null;

function connectServer() {
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
    ws = new WebSocket(SERVER);

    ws.onopen = () => {
        console.log('WebSocket 已连接');
        document.getElementById('dotServer').classList.remove('off');
        document.getElementById('dotServer').classList.add('on');
        document.getElementById('lblServer').textContent = '服务器在线';
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    };

    ws.onmessage = (msg) => {
        console.log('收到消息:', msg.data);
        // 可在这里处理服务器指令
    };

    ws.onerror = (err) => { console.log('WebSocket 错误', err); };
    ws.onclose = () => {
        console.log('WebSocket 已断开，2秒后重连...');
        document.getElementById('dotServer').classList.remove('on');
        document.getElementById('dotServer').classList.add('off');
        document.getElementById('lblServer').textContent = '服务器断开';
        if (!reconnectTimer) {
            reconnectTimer = setTimeout(connectServer, reconnectDelay);
        }
    };
}

// ===== 摄像头初始化 =====
async function initVideo() {
    try {
        const videoEl = document.getElementById('videoFeed');
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        videoEl.srcObject = stream;
        videoEl.style.display = 'block';
        document.getElementById('videoPlaceholder').style.display = 'none';
        document.getElementById('dotVideo').classList.remove('off');
        document.getElementById('dotVideo').classList.add('on');
        document.getElementById('lblVideo').textContent = '视频已启用';
    } catch (e) {
        console.warn('无法访问摄像头:', e);
        document.getElementById('dotVideo').classList.remove('on');
        document.getElementById('dotVideo').classList.add('off');
        document.getElementById('lblVideo').textContent = '视频禁用';
    }
}

// ===== 页面加载 =====
window.addEventListener('load', () => {
    connectServer();
    initVideo();

    // 时钟更新
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString();
    }, 1000);
});
</script>
</body>
</html>
