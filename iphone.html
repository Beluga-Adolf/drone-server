<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TRACE AERIAL · COCKPIT</title>
<style>
/* 保持原样式不变 */
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--amber:#f5a623;--amber-dim:#7a530f;--green:#00ff88;--red:#ff3b3b;--cyan:#00d4ff;--bg:#070a0e;--panel:#0b1018;--border:#1a2a3a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--amber);font-family:'Share Tech Mono',monospace;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px);pointer-events:none;z-index:1000}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.65) 100%);pointer-events:none;z-index:999}
/* 其他 CSS 全部保持原样，这里省略 */
</style>
</head>
<body>
<div class="scan-line"></div>
<div class="top-bar">
  <div class="logo">TRACE AERIAL</div>
  <div class="status-row">
    <div class="status-item"><div class="dot" id="dotServer"></div><span id="lblServer">服务器</span></div>
    <div class="status-item"><div class="dot off" id="dotPhone"></div><span id="lblPhone">iPhone离线</span></div>
    <div class="status-item"><div class="dot off" id="dotVideo"></div><span id="lblVideo">视频</span></div>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</div>

<!-- main, side-panel, center, right-panel 保持原样，这里省略 -->

<div class="bottom-bar">
  <div class="coord-display"><div>DRONE <span>ND-7</span></div><div>PAYLOAD <span>iPhone CAM</span></div></div>
  <div class="mission-status" id="missionTxt">■ STANDBY</div>
  <div class="coord-display"><div>DIST <span id="dist">0m</span></div><div>SPD <span id="spdBot">0.0</span> km/h</div></div>
</div>

<script>
const SERVER='wss://trace-light-drone-server.onrender.com'; // ⚡ 确保 WSS 地址 HTTPS

let ws=null;
let reconnectDelay=2000;
let maxReconnect=10;
let reconnectCount=0;

// 更新时钟
setInterval(()=>{document.getElementById('clock').textContent=new Date().toTimeString().slice(0,8)},1000);

// 飞行计时
let flightStart=null;
function updateFlightTimer(){
  if(!flightStart)return;
  let seconds=Math.floor((Date.now()-flightStart)/1000);
  const h=Math.floor(seconds/3600),m=Math.floor((seconds%3600)/60),s=seconds%60;
  document.getElementById('flightTimer').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('timeBar').style.width=Math.min(100,(seconds/1800)*100)+'%';
}

// 自动连接 WSS
function connectServer(){
  if(ws && (ws.readyState===WebSocket.OPEN || ws.readyState===WebSocket.CONNECTING)) return;

  ws=new WebSocket(SERVER);

  ws.onopen=()=>{
    reconnectCount=0;
    flightStart=new Date();
    document.getElementById('dotServer').classList.remove('off');
    document.getElementById('lblServer').textContent='已连接';
    console.log('WebSocket 连接成功');
  };

  ws.onmessage=(evt)=>{
    // ⚡这里你原来解析 JSON 数据的逻辑不变
    console.log('收到数据', evt.data);
  };

  ws.onclose=(evt)=>{
    document.getElementById('dotServer').classList.add('off');
    document.getElementById('lblServer').textContent='断线重连…';
    if(reconnectCount<maxReconnect){
      reconnectCount++;
      console.log(`尝试第 ${reconnectCount} 次重连`);
      setTimeout(connectServer,reconnectDelay);
    } else {
      console.warn('达到最大重连次数，请检查网络或服务器');
    }
  };

  ws.onerror=(err)=>{
    console.error('WebSocket 错误', err);
    ws.close();
  };
}

// 请求摄像头权限
async function requestCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    const video=document.getElementById('videoFeed');
    video.srcObject=stream;
    video.style.display='block';
    document.getElementById('videoPlaceholder').style.display='none';
    document.getElementById('dotPhone').classList.remove('off');
    document.getElementById('lblPhone').textContent='iPhone在线';
  }catch(e){
    console.warn('摄像头权限被拒绝或不可用',e);
  }
}

// 初始化
window.addEventListener('load',()=>{
  connectServer();
  requestCamera();
});
</script>
</body>
</html>
