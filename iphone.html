<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞行端</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050e08;color:#00ff88;font-family:'Courier New',monospace;padding:24px 20px;min-height:100vh}
h2{font-size:12px;letter-spacing:4px;color:#00cc66;margin-bottom:20px;border-bottom:1px solid #003020;padding-bottom:12px}
.row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #001a10;font-size:13px}
.label{color:#336644}.ok{color:#00ff88}.err{color:#ff4444}.wait{color:#ffaa00}
.btn{width:100%;padding:18px;background:#001a10;border:2px solid #00ff88;color:#00ff88;font-size:16px;letter-spacing:2px;border-radius:10px;margin-top:20px;font-family:'Courier New',monospace}
video{width:100%;border-radius:8px;margin-top:14px;border:1px solid #003020}
.warn{background:#1a0800;border:1px solid #ff6600;color:#ff9944;border-radius:8px;padding:12px;font-size:12px;line-height:1.9;margin-top:16px}
.log{background:#001a10;border:1px solid #003020;border-radius:8px;padding:10px;font-size:11px;color:#5a9a6a;line-height:1.8;margin-top:12px;min-height:80px;word-break:break-all}
</style>
</head>
<body>
<h2>TRACE AERIAL · 飞行端</h2>
<div class="row"><span class="label">服务器</span><span id="s1"><span class="wait">连接中...</span></span></div>
<div class="row"><span class="label">摄像头</span><span id="s2"><span class="wait">未启动</span></span></div>
<div class="row"><span class="label">方向传感器</span><span id="s3"><span class="wait">未启动</span></span></div>
<div class="row"><span class="label">运动传感器</span><span id="s3b"><span class="wait">未启动</span></span></div>
<div class="row"><span class="label">GPS</span><span id="s3c"><span class="wait">未启动</span></span></div>
<div class="row"><span class="label">iPad在线</span><span id="s4"><span class="wait">等待中</span></span></div>
<div class="row"><span class="label">推流帧率</span><span id="s5"><span class="wait">--</span></span></div>
<div class="row"><span class="label">重连次数</span><span id="s6">0</span></div>

<button class="btn" id="btn" onclick="startAll()">▶ 第一步：启动摄像头</button>
<button class="btn" id="btn2" onclick="startSensors()" style="margin-top:10px;border-color:#ffaa00;color:#ffaa00">▶ 第二步：启动传感器（必须单独点）</button>
<button class="btn" id="btn3" onclick="toggleRecording()" style="margin-top:10px;border-color:#00aaff;color:#00aaff">⏺ 开始本地录像</button>

<video id="v" autoplay muted playsinline></video>

<div class="log" id="log">等待操作...</div>

<div class="warn">
⚠️ iOS 18 必须分两步操作<br>
· 先点第一步启动摄像头<br>
· 再点第二步启动传感器<br>
· 两个按钮都要点，顺序不能反<br>
· 必须用 Safari 打开
</div>

<script>
const SERVER='wss://trace-light-drone-server.onrender.com';

let ws,stream,retries=0,sensorTimer,frameTimer,frameCount=0,fpsTimer;

// 新增：本地录像
let recorder=null;
let recordingChunks=[];
let isRecording=false;

let sensorStarted=false;

const sensor={pitch:0,roll:0,heading:0,gforce:1,speed:0,altitude:null,lat:null,lon:null};

const canvas=document.createElement('canvas');
const ctx2d=canvas.getContext('2d');

function set(id,html){document.getElementById(id).innerHTML=html}
function ok(t){return`<span class="ok">✓ ${t}</span>`}
function err(t){return`<span class="err">✗ ${t}</span>`}
function wait(t){return`<span class="wait">${t}</span>`}

function log(t){
  const el=document.getElementById('log');
  el.textContent=t+'\n'+el.textContent.slice(0,300);
  console.log('[DBG]',t);
}

window.onload=()=>{
  log('页面加载，开始连接服务器...');
  connectWS();
};

function connectWS(){
  log('创建WebSocket...');
  try{
    ws=new WebSocket(SERVER);
  }catch(e){
    log('创建失败:'+e.message);
    scheduleReconnect();
    return;
  }

  ws.onopen=()=>{
    retries=0;
    log('✓ 服务器已连接，发送iphone-hello');
    set('s1',ok('已连接'));
    ws.send(JSON.stringify({type:'iphone-hello'}));
    clearInterval(sensorTimer);
    sensorTimer=setInterval(sendSensors,100);
  };

  ws.onmessage=(e)=>{
    let msg;try{msg=JSON.parse(e.data)}catch{return}
    log('收到消息: '+msg.type);
  };

  ws.onclose=(e)=>{
    log('连接关闭 code:'+e.code);
    set('s1',wait('断线重连...'));
    clearInterval(sensorTimer);
    clearInterval(frameTimer);
    clearInterval(fpsTimer);
    scheduleReconnect();
  };

  ws.onerror=()=>{
    log('WebSocket错误');
    set('s1',err('连接错误'));
  };
}

function scheduleReconnect(){
  retries++;
  set('s6',retries);
  const delay=Math.min(16000,1000*Math.pow(2,Math.min(retries-1,4)));
  log('将在'+delay+'ms后重连');
  setTimeout(connectWS,delay);
}

async function startAll(){
  document.getElementById('btn').disabled=true;
  document.getElementById('btn').textContent='启动中...';
  log('请求摄像头权限...');

  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:'environment',
        width:{ideal:1280},
        height:{ideal:720},
        frameRate:{ideal:30}
      },
      audio:false
    });

    document.getElementById('v').srcObject=stream;
    set('s2',ok('后置摄像头'));
    log('✓ 摄像头已启动');
    document.getElementById('btn').textContent='✓ 摄像头已启动';

  }catch(e){
    set('s2',err(e.message));
    log('✗ 摄像头失败: '+e.message);
    document.getElementById('btn').disabled=false;
    document.getElementById('btn').textContent='重试摄像头';
    return;
  }

  document.getElementById('v').onloadedmetadata=()=>{
    log('视频就绪，开始推帧');
    startFrameLoop();
  };
}

async function startSensors(){
  document.getElementById('btn2').disabled=true;
  document.getElementById('btn2').textContent='请求权限中...';
  log('开始请求传感器权限...');

  if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
    try{
      const r=await DeviceOrientationEvent.requestPermission();
      if(r==='granted'){
        set('s3',ok('已授权'));
      }else{
        set('s3',err('被拒绝'));
      }
    }catch(e){
      set('s3',err(e.message));
    }
  }else{
    set('s3',ok('无需授权'));
  }

  if(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function'){
    try{
      const r=await DeviceMotionEvent.requestPermission();
      if(r==='granted'){
        set('s3b',ok('已授权'));
      }else{
        set('s3b',err('被拒绝'));
      }
    }catch(e){
      set('s3b',err(e.message));
    }
  }else{
    set('s3b',ok('无需授权'));
  }

  window.addEventListener('deviceorientation',(e)=>{
    sensor.pitch=+(e.beta??0).toFixed(1);
    sensor.roll=+(e.gamma??0).toFixed(1);
    sensor.heading=Math.round(e.alpha??0);
  },true);

  window.addEventListener('devicemotion',(e)=>{
    const a=e.accelerationIncludingGravity;
    if(a){
      sensor.gforce=+(Math.sqrt((a.x??0)**2+(a.y??0)**2+(a.z??0)**2)/9.81).toFixed(2);
    }
  },true);

  if('geolocation' in navigator){
    navigator.geolocation.watchPosition((p)=>{
      sensor.lat=p.coords.latitude;
      sensor.lon=p.coords.longitude;
      sensor.altitude=p.coords.altitude??null;
      sensor.speed=+((p.coords.speed??0)*3.6).toFixed(1);
      set('s3c',ok(sensor.lat.toFixed(4)+','+sensor.lon.toFixed(4)));
    },(e)=>{
      set('s3c',err(e.message));
    },{enableHighAccuracy:true,maximumAge:500,timeout:10000});
  }

  sensorStarted=true;
  document.getElementById('btn2').textContent='✓ 传感器已启动';
}

function startFrameLoop(){
  const video=document.getElementById('v');
  canvas.width=640;
  canvas.height=360;
  frameCount=0;

  fpsTimer=setInterval(()=>{
    set('s5',ok(frameCount+' fps'));
    frameCount=0;
  },1000);

  frameTimer=setInterval(()=>{
    if(ws?.readyState!==1||video.readyState<2)return;
    ctx2d.drawImage(video,0,0,640,360);
    const jpeg=canvas.toDataURL('image/jpeg',0.5);
    ws.send(JSON.stringify({type:'frame',data:jpeg}));
    frameCount++;
  },100);
}

function sendSensors(){
  if(ws?.readyState===1){
    ws.send(JSON.stringify({type:'sensors',data:sensor}));
  }
}

// 新增：本地录像功能
function toggleRecording(){
  if(!stream){
    alert('请先启动摄像头');
    return;
  }

  if(!isRecording){
    startRecording();
  }else{
    stopRecording();
  }
}

function startRecording(){
  try{
    recordingChunks=[];

    recorder=new MediaRecorder(stream);

    recorder.ondataavailable=(e)=>{
      if(e.data && e.data.size>0){
        recordingChunks.push(e.data);
      }
    };

    recorder.onstop=saveRecording;

    recorder.start(1000);

    isRecording=true;
    document.getElementById('btn3').textContent='■ 停止并保存';
    log('✓ 本地录像已开始');

  }catch(e){
    log('✗ 录像失败: '+e.message);
    alert('录像启动失败：'+e.message);
  }
}

function stopRecording(){
  if(recorder && isRecording){
    recorder.stop();
    isRecording=false;
    document.getElementById('btn3').textContent='⏺ 开始本地录像';
    log('正在保存视频...');
  }
}

function saveRecording(){
  const blob=new Blob(recordingChunks,{type:'video/mp4'});
  const url=URL.createObjectURL(blob);

  const a=document.createElement('a');
  a.href=url;
  a.download='trace_flight_'+Date.now()+'.mp4';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  log('✓ 视频已保存到文件');
}
</script>
</body>
</html>
